### data
train_dataset_type: erniekit
eval_dataset_type: erniekit
train_dataset_path: ./data/sft/school_math_0.25M/train.jsonl
train_dataset_prob: "1.0"
eval_dataset_path: ./data/sft/school_math_0.25M/dev.jsonl
eval_dataset_prob: "1.0"
max_seq_len: 4096
packing: true

### model
model_name_or_path: ./models/Llama-2-13b
_attn_implementation: flashmask
lora: true
lora_rank: 8
lora_alpha: 16

### finetuning
stage: SFT
fine_tuning: lora
seed: 23
per_device_train_batch_size: 1
max_steps: 100
eval_steps: 100
evaluation_strategy: steps
save_steps: 100
save_strategy: steps
logging_steps: 1
gradient_accumulation_steps: 4
logging_dir: ./logs/lora
output_dir: ./checkpoints/lora/llama2-13b-lora
disable_tqdm: true

# train
warmup_steps: 10
learning_rate: 1.0e-4

# performance
tensor_model_parallel_size: 2
pipeline_model_parallel_size: 2
sharding: stage1
recompute_granularity: full
recompute_method: uniform
recompute_num_layers: 1
bf16: true

# device
device: xpu